<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deedbridge Chatbot 数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        :root {
            --bg-primary: #f0f2f5;
            --bg-card: #ffffff;
            --bg-header: #1a1a2e;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --text-on-dark: #ffffff;
            --accent: #4C72B0;
            --color-1: #4C72B0;
            --color-2: #DD8452;
            --color-3: #55A868;
            --color-4: #C44E52;
            --color-5: #8172B3;
            --color-6: #937860;
            --positive: #28a745;
            --negative: #dc3545;
            --warning: #ffc107;
            --gap: 16px;
            --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: var(--gap); }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--text-on-dark);
            padding: 24px 28px;
            border-radius: var(--radius);
            margin-bottom: var(--gap);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 22px; font-weight: 700; }
        .header .subtitle { font-size: 13px; opacity: 0.7; margin-top: 4px; }
        .header .filters { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .header select, .header input {
            background: rgba(255,255,255,0.12);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        .header select option { color: #333; background: white; }
        .header label { font-size: 12px; opacity: 0.7; }
        .filter-group { display: flex; flex-direction: column; gap: 2px; }

        /* KPI Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .kpi-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
        }
        .kpi-card:nth-child(1)::before { background: var(--color-1); }
        .kpi-card:nth-child(2)::before { background: var(--color-2); }
        .kpi-card:nth-child(3)::before { background: var(--color-3); }
        .kpi-card:nth-child(4)::before { background: var(--color-4); }
        .kpi-card:nth-child(5)::before { background: var(--color-5); }
        .kpi-card:nth-child(6)::before { background: var(--color-6); }
        .kpi-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .kpi-value { font-size: 30px; font-weight: 700; }
        .kpi-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .kpi-sub.positive { color: var(--positive); }
        .kpi-sub.negative { color: var(--negative); }
        .kpi-sub.warning { color: var(--warning); }

        /* Chart Grid */
        .chart-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .chart-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .chart-card.full-width { grid-column: 1 / -1; }
        .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
        .chart-container { position: relative; height: 280px; }
        .chart-container.tall { height: 350px; }

        /* Funnel */
        .funnel-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: var(--gap);
        }
        .funnel-steps { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .funnel-step {
            display: flex; align-items: center; gap: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            background: #f8f9fa;
            transition: all 0.2s;
        }
        .funnel-step:hover { background: #e9ecef; }
        .funnel-bar {
            height: 32px;
            border-radius: 6px;
            transition: width 0.6s ease;
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }
        .funnel-label { font-size: 14px; min-width: 140px; font-weight: 500; }
        .funnel-pct { font-size: 13px; color: var(--text-secondary); min-width: 50px; text-align: right; }
        .funnel-drop { font-size: 11px; color: var(--negative); margin-left: auto; }

        /* Session Table */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: var(--gap);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover { color: var(--accent); }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: top;
        }
        tr:hover td { background: #f8f9fa; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-real { background: #d4edda; color: #155724; }
        .badge-test { background: #e2e3e5; color: #6c757d; }
        .badge-yes { background: #cce5ff; color: #004085; }
        .badge-warn { background: #fff3cd; color: #856404; }
        .badge-esc { background: #f8d7da; color: #721c24; }
        .msg-preview {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-secondary);
        }

        /* Insights Section */
        .insights-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: var(--gap);
        }
        .insight-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .insight-item:last-child { border-bottom: none; }
        .insight-icon { font-size: 20px; min-width: 32px; text-align: center; }
        .insight-text { font-size: 14px; line-height: 1.5; }
        .insight-text strong { color: var(--accent); }

        /* Conversation Detail Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .modal h3 { margin-bottom: 16px; }
        .chat-bubble {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
        }
        .chat-user {
            background: var(--accent);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .chat-bot {
            background: #f0f0f0;
            border-bottom-left-radius: 4px;
        }
        .chat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .chart-grid { grid-template-columns: 1fr; }
            .kpi-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div>
            <h1>Deedbridge Chatbot 数据看板</h1>
            <div class="subtitle" id="date-range"></div>
        </div>
        <div class="filters">
            <div class="filter-group">
                <label>会话类型</label>
                <select id="filter-type" onchange="dashboard.applyFilters()">
                    <option value="all">全部</option>
                    <option value="real">真实访客</option>
                    <option value="test">测试会话</option>
                </select>
            </div>
        </div>
    </div>

    <!-- KPI Cards -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- Funnel -->
    <div class="funnel-card">
        <div class="chart-title">对话漏斗 Conversation Funnel</div>
        <div class="funnel-steps" id="funnel"></div>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title">会话轮次分布 Turns per Session</div>
            <div class="chart-container"><canvas id="chart-turns"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">关键事件统计 Key Events</div>
            <div class="chart-container"><canvas id="chart-events"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">响应延迟分布 Latency (ms)</div>
            <div class="chart-container"><canvas id="chart-latency"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">会话时长 vs 轮次</div>
            <div class="chart-container"><canvas id="chart-scatter"></canvas></div>
        </div>
        <div class="chart-card full-width">
            <div class="chart-title">会话时间线 Session Timeline</div>
            <div class="chart-container tall"><canvas id="chart-timeline"></canvas></div>
        </div>
    </div>

    <!-- Insights -->
    <div class="insights-card">
        <div class="chart-title">洞察 Key Insights</div>
        <div id="insights"></div>
    </div>

    <!-- Session Table -->
    <div class="table-card">
        <div class="chart-title">会话明细 Session Details <span style="font-weight:normal;font-size:12px;color:var(--text-secondary)">（点击行查看对话）</span></div>
        <table>
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <!-- Conversation Modal -->
    <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer>
        Deedbridge Chatbot Analytics &middot; 数据来源: Firestore chat_messages &middot; 生成于 <span id="gen-date"></span>
    </footer>
</div>

const COLORS = ['#4C72B0','#DD8452','#55A868','#C44E52','#8172B3','#937860','#DA8BC3','#8C8C8C','#CCB974','#64B5CD'];

// ── Dashboard Class ────────────────────────────────────────────────────────────
class Dashboard {
    constructor(data) {
        this.rawSessions = data.sessions;
        this.summary = data.summary;
        this.filteredSessions = [...this.rawSessions];
        this.charts = {};
        this.sortCol = 'startedAt';
        this.sortDir = 'desc';
        this.init();
    }

    init() {
        document.getElementById('date-range').textContent =
            `${this.fmtDate(this.summary.dateRange.from)} — ${this.fmtDate(this.summary.dateRange.to)}`;
        document.getElementById('gen-date').textContent = new Date().toLocaleString('zh-CN');
        this.renderAll();
    }

    applyFilters() {
        const typeFilter = document.getElementById('filter-type').value;
        this.filteredSessions = this.rawSessions.filter(s => {
            if (typeFilter === 'real') return s.isRealVisitor;
            if (typeFilter === 'test') return !s.isRealVisitor;
            return true;
        });
        this.renderAll();
    }

    renderAll() {
        this.renderKPIs();
        this.renderFunnel();
        this.renderCharts();
        this.renderInsights();
        this.renderTable();
    }

    // ── KPIs ───────────────────────────────────────────────────────────────────
    renderKPIs() {
        const s = this.filteredSessions;
        const total = s.length;
        const real = s.filter(x => x.isRealVisitor).length;
        const totalTurns = s.reduce((a, x) => a + x.turns, 0);
        const avgTurns = total ? (totalTurns / total).toFixed(1) : 0;
        const avgLat = total ? Math.round(s.reduce((a, x) => a + x.avgLatencyMs, 0) / total) : 0;
        const emails = s.filter(x => x.emailCaptured).length;
        const buying = s.filter(x => x.buyingSignalDetected).length;

        const kpis = [
            { label: '总会话', value: total, sub: `真实访客 ${real}`, cls: '' },
            { label: '总轮次', value: totalTurns, sub: `平均 ${avgTurns} 轮/会话`, cls: '' },
            { label: '平均延迟', value: `${(avgLat/1000).toFixed(1)}s`, sub: avgLat > 3000 ? '偏高' : '正常', cls: avgLat > 3000 ? 'warning' : 'positive' },
            { label: '邮箱收集', value: emails, sub: total ? `${(emails/total*100).toFixed(0)}% 转化` : '-', cls: emails > 0 ? 'positive' : '' },
            { label: '购买信号', value: buying, sub: total ? `${(buying/total*100).toFixed(0)}% 会话` : '-', cls: buying > 0 ? 'positive' : '' },
            { label: '升级/转人工', value: s.filter(x => x.escalated).length, sub: '需人工跟进', cls: 'warning' },
        ];

        document.getElementById('kpi-row').innerHTML = kpis.map(k => `
            <div class="kpi-card">
                <div class="kpi-label">${k.label}</div>
                <div class="kpi-value">${k.value}</div>
                <div class="kpi-sub ${k.cls}">${k.sub}</div>
            </div>
        `).join('');
    }

    // ── Funnel ─────────────────────────────────────────────────────────────────
    renderFunnel() {
        const s = this.filteredSessions;
        const total = s.length;
        const multiTurn = s.filter(x => x.turns >= 2).length;
        const engaged = s.filter(x => x.turns >= 3).length;
        const buying = s.filter(x => x.buyingSignalDetected).length;
        const cta = s.filter(x => x.ctaShown).length;
        const emailCap = s.filter(x => x.emailCaptured).length;

        const steps = [
            { label: '开始对话', count: total, color: COLORS[0] },
            { label: '多轮对话 (>=2轮)', count: multiTurn, color: COLORS[1] },
            { label: '深度参与 (>=3轮)', count: engaged, color: COLORS[2] },
            { label: '购买意向信号', count: buying, color: COLORS[3] },
            { label: '展示CTA', count: cta, color: COLORS[4] },
            { label: '邮箱收集', count: emailCap, color: COLORS[5] },
        ];

        const maxCount = Math.max(...steps.map(x => x.count), 1);
        document.getElementById('funnel').innerHTML = steps.map((step, i) => {
            const pct = total ? (step.count / total * 100).toFixed(0) : 0;
            const barW = Math.max((step.count / maxCount) * 100, 8);
            const prev = i > 0 ? steps[i-1].count : null;
            const drop = prev && prev > 0 ? `流失 ${((1 - step.count/prev)*100).toFixed(0)}%` : '';
            return `
                <div class="funnel-step">
                    <div class="funnel-label">${step.label}</div>
                    <div class="funnel-bar" style="width:${barW}%;background:${step.color}">${step.count}</div>
                    <div class="funnel-pct">${pct}%</div>
                    ${drop ? `<div class="funnel-drop">${drop}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    // ── Charts ─────────────────────────────────────────────────────────────────
    renderCharts() {
        // Destroy existing
        Object.values(this.charts).forEach(c => c.destroy());
        this.charts = {};
        const s = this.filteredSessions;

        // 1. Turns distribution
        const turnBuckets = {'1轮': 0, '2轮': 0, '3轮': 0, '4-5轮': 0, '6+轮': 0};
        s.forEach(x => {
            if (x.turns === 1) turnBuckets['1轮']++;
            else if (x.turns === 2) turnBuckets['2轮']++;
            else if (x.turns === 3) turnBuckets['3轮']++;
            else if (x.turns <= 5) turnBuckets['4-5轮']++;
            else turnBuckets['6+轮']++;
        });
        this.charts.turns = new Chart(document.getElementById('chart-turns'), {
            type: 'bar',
            data: {
                labels: Object.keys(turnBuckets),
                datasets: [{
                    data: Object.values(turnBuckets),
                    backgroundColor: COLORS.slice(0, 5).map(c => c + 'CC'),
                    borderColor: COLORS.slice(0, 5),
                    borderWidth: 1, borderRadius: 6,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } }
            }
        });

        // 2. Key Events (horizontal bar)
        const events = {
            'Email 收集': s.filter(x => x.emailCaptured).length,
            '购买信号': s.filter(x => x.buyingSignalDetected).length,
            'CTA 展示': s.filter(x => x.ctaShown).length,
            '升级转人工': s.filter(x => x.escalated).length,
        };
        this.charts.events = new Chart(document.getElementById('chart-events'), {
            type: 'bar',
            data: {
                labels: Object.keys(events),
                datasets: [{
                    data: Object.values(events),
                    backgroundColor: [COLORS[2]+'CC', COLORS[0]+'CC', COLORS[1]+'CC', COLORS[3]+'CC'],
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: { legend: { display: false } },
                scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } }, y: { grid: { display: false } } }
            }
        });

        // 3. Latency distribution
        const latBuckets = {'<1s': 0, '1-2s': 0, '2-3s': 0, '3-4s': 0, '4-5s': 0, '>5s': 0};
        s.forEach(x => {
            const l = x.avgLatencyMs;
            if (l < 1000) latBuckets['<1s']++;
            else if (l < 2000) latBuckets['1-2s']++;
            else if (l < 3000) latBuckets['2-3s']++;
            else if (l < 4000) latBuckets['3-4s']++;
            else if (l < 5000) latBuckets['4-5s']++;
            else latBuckets['>5s']++;
        });
        this.charts.latency = new Chart(document.getElementById('chart-latency'), {
            type: 'bar',
            data: {
                labels: Object.keys(latBuckets),
                datasets: [{
                    data: Object.values(latBuckets),
                    backgroundColor: Object.keys(latBuckets).map((_, i) => {
                        const colors = ['#55A868CC','#55A868CC','#4C72B0CC','#DD8452CC','#C44E52CC','#C44E52CC'];
                        return colors[i];
                    }),
                    borderRadius: 6,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } }
            }
        });

        // 4. Scatter: duration vs turns (real visitors only)
        const realSessions = s.filter(x => x.isRealVisitor && x.durationSec > 0);
        this.charts.scatter = new Chart(document.getElementById('chart-scatter'), {
            type: 'scatter',
            data: {
                datasets: [{
                    label: '真实访客',
                    data: realSessions.map(x => ({ x: x.turns, y: x.durationSec, label: x.sessionId })),
                    backgroundColor: COLORS[0] + '99',
                    borderColor: COLORS[0],
                    pointRadius: 8,
                    pointHoverRadius: 12,
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.raw.x} 轮, ${ctx.raw.y}秒`
                        }
                    }
                },
                scales: {
                    x: { title: { display: true, text: '轮次' }, beginAtZero: true, ticks: { stepSize: 1 } },
                    y: { title: { display: true, text: '时长 (秒)' }, beginAtZero: true }
                }
            }
        });

        // 5. Timeline
        const timelineData = s.map((x, i) => ({
            x: new Date(x.startedAt),
            y: x.turns,
            r: Math.max(x.durationSec / 10, 5),
            session: x,
        }));
        this.charts.timeline = new Chart(document.getElementById('chart-timeline'), {
            type: 'bubble',
            data: {
                datasets: [{
                    label: '真实访客',
                    data: timelineData.filter(d => d.session.isRealVisitor),
                    backgroundColor: COLORS[0] + '66',
                    borderColor: COLORS[0],
                }, {
                    label: '测试会话',
                    data: timelineData.filter(d => !d.session.isRealVisitor),
                    backgroundColor: COLORS[7] + '44',
                    borderColor: COLORS[7],
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        callbacks: {
                            label: ctx => {
                                const d = ctx.raw;
                                return `${d.session.turns}轮 · ${d.session.durationSec}秒 · "${d.session.firstMessage}"`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'hour', displayFormats: { hour: 'MM/dd HH:mm' } },
                        title: { display: true, text: '时间' }
                    },
                    y: { title: { display: true, text: '轮次' }, beginAtZero: true, ticks: { stepSize: 1 } }
                }
            }
        });
    }

    // ── Insights ───────────────────────────────────────────────────────────────
    renderInsights() {
        const s = this.filteredSessions;
        const real = s.filter(x => x.isRealVisitor);
        const insights = [];

        // Engagement
        const avgTurnsReal = real.length ? (real.reduce((a,x) => a+x.turns, 0) / real.length).toFixed(1) : 0;
        insights.push({
            icon: '💬',
            text: `真实访客平均 <strong>${avgTurnsReal} 轮</strong>对话，测试会话多为单轮。真实访客参与度显著高于测试。`
        });

        // Bounce
        const singleTurn = s.filter(x => x.turns === 1).length;
        const bounceRate = s.length ? (singleTurn / s.length * 100).toFixed(0) : 0;
        insights.push({
            icon: '🚪',
            text: `单轮跳出率 <strong>${bounceRate}%</strong>（${singleTurn}/${s.length}）。${singleTurn > s.length/2 ? '大部分是测试会话，真实访客跳出率较低。' : '跳出率可控。'}`
        });

        // Email conversion
        const emailReal = real.filter(x => x.emailCaptured).length;
        insights.push({
            icon: '📧',
            text: `真实访客中 <strong>${emailReal}/${real.length}</strong> 留了邮箱。${emailReal > 0 ? '邮箱收集机制已生效。' : '目前无真实访客留邮箱，需优化 CTA 触发时机。'}`
        });

        // Buying signal → CTA
        const buyingNoCtaReal = real.filter(x => x.buyingSignalDetected && !x.ctaShown);
        if (buyingNoCtaReal.length > 0) {
            insights.push({
                icon: '⚠️',
                text: `<strong>${buyingNoCtaReal.length}</strong> 个会话检测到购买信号但未展示 CTA — 这是转化漏洞。会话: ${buyingNoCtaReal.map(x => '"'+x.firstMessage+'"').join(', ')}`
            });
        }

        // Latency
        const highLat = s.filter(x => x.avgLatencyMs > 4000);
        if (highLat.length > 0) {
            insights.push({
                icon: '🐢',
                text: `<strong>${highLat.length}</strong> 个会话延迟超过 4 秒，可能影响用户体验。最高: ${Math.max(...highLat.map(x=>x.avgLatencyMs))}ms`
            });
        }

        // Longest session
        const longest = [...real].sort((a,b) => b.durationSec - a.durationSec)[0];
        if (longest) {
            insights.push({
                icon: '⏱️',
                text: `最长会话 <strong>${longest.turns} 轮 / ${this.fmtDuration(longest.durationSec)}</strong>，首条消息: "${longest.firstMessage}"。${longest.durationSec > 300 ? '用户非常感兴趣但可能犹豫不决。' : ''}`
            });
        }

        // Decline after scenario
        const declineSessions = s.filter(x => x.messages && x.messages.some(m => m.user.toLowerCase().trim() === 'no'));
        if (declineSessions.length > 0) {
            const dumpedAfter = declineSessions.filter(x => {
                const noIdx = x.messages.findIndex(m => m.user.toLowerCase().trim() === 'no');
                if (noIdx >= 0 && noIdx < x.messages.length - 1) {
                    return x.messages[noIdx].bot.toLowerCase().includes('scenario') || x.messages[noIdx].bot.toLowerCase().includes('imagine');
                }
                return false;
            });
            insights.push({
                icon: '🛑',
                text: `<strong>${declineSessions.length}</strong> 个会话中访客说了 "no"。${dumpedAfter.length > 0 ? `其中 ${dumpedAfter.length} 个在 "no" 后仍然推送了新场景（Rule #15 问题）。` : '在 "no" 后的处理尚可。'}`
            });
        }

        document.getElementById('insights').innerHTML = insights.map(i => `
            <div class="insight-item">
                <div class="insight-icon">${i.icon}</div>
                <div class="insight-text">${i.text}</div>
            </div>
        `).join('');
    }

    // ── Table ──────────────────────────────────────────────────────────────────
    renderTable() {
        const columns = [
            { key: 'isRealVisitor', label: '类型' },
            { key: 'turns', label: '轮次' },
            { key: 'durationSec', label: '时长' },
            { key: 'avgLatencyMs', label: '延迟' },
            { key: 'firstMessage', label: '首条消息' },
            { key: 'emailCaptured', label: '邮箱' },
            { key: 'buyingSignalDetected', label: '购买信号' },
            { key: 'ctaShown', label: 'CTA' },
            { key: 'escalated', label: '升级' },
            { key: 'startedAt', label: '时间' },
        ];

        document.getElementById('table-head').innerHTML = '<tr>' + columns.map(c =>
            `<th onclick="dashboard.sort('${c.key}')">${c.label}${this.sortCol === c.key ? (this.sortDir === 'asc' ? ' ▲' : ' ▼') : ''}</th>`
        ).join('') + '</tr>';

        const sorted = [...this.filteredSessions].sort((a, b) => {
            let av = a[this.sortCol], bv = b[this.sortCol];
            if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
            if (typeof av === 'string') { av = av.toLowerCase(); bv = bv.toLowerCase(); }
            const cmp = av < bv ? -1 : av > bv ? 1 : 0;
            return this.sortDir === 'asc' ? cmp : -cmp;
        });

        document.getElementById('table-body').innerHTML = sorted.map((s, i) => `
            <tr style="cursor:pointer" onclick="showSession(${i})">
                <td>${s.isRealVisitor ? '<span class="badge badge-real">真实</span>' : '<span class="badge badge-test">测试</span>'}</td>
                <td><strong>${s.turns}</strong></td>
                <td>${s.durationSec > 0 ? this.fmtDuration(s.durationSec) : '-'}</td>
                <td>${(s.avgLatencyMs/1000).toFixed(1)}s</td>
                <td><div class="msg-preview">${this.esc(s.firstMessage)}</div></td>
                <td>${s.emailCaptured ? '<span class="badge badge-yes">'+this.esc(s.capturedEmail)+'</span>' : '-'}</td>
                <td>${s.buyingSignalDetected ? '<span class="badge badge-yes">Yes</span>' : '-'}</td>
                <td>${s.ctaShown ? '<span class="badge badge-yes">Yes</span>' : '-'}</td>
                <td>${s.escalated ? '<span class="badge badge-esc">Yes</span>' : '-'}</td>
                <td style="white-space:nowrap;font-size:12px">${this.fmtDate(s.startedAt)}</td>
            </tr>
        `).join('');

        // Store sorted for modal
        this._sortedSessions = sorted;
    }

    sort(col) {
        if (this.sortCol === col) {
            this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            this.sortCol = col;
            this.sortDir = 'desc';
        }
        this.renderTable();
    }

    // ── Helpers ────────────────────────────────────────────────────────────────
    fmtDate(iso) {
        const d = new Date(iso);
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }
    fmtDuration(sec) {
        if (sec < 60) return `${sec}秒`;
        return `${Math.floor(sec/60)}分${sec%60}秒`;
    }
    esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function showSession(idx) {
    const s = dashboard._sortedSessions[idx];
    document.getElementById('modal-title').textContent =
        `${s.isRealVisitor ? '🟢 真实访客' : '🔵 测试'} · ${s.turns}轮 · ${s.durationSec > 0 ? dashboard.fmtDuration(s.durationSec) : '单次'}`;

    let html = `<div style="margin-bottom:16px;font-size:12px;color:#6c757d">
        Session: ${s.sessionId}<br>
        时间: ${new Date(s.startedAt).toLocaleString('zh-CN')}<br>
        ${s.capturedEmail ? '📧 '+s.capturedEmail+'<br>' : ''}
        ${s.escalated ? '⚠️ 已升级转人工<br>' : ''}
        ${s.buyingSignalDetected ? '🎯 检测到购买信号<br>' : ''}
    </div>`;

    s.messages.forEach(m => {
        html += `<div class="chat-label" style="text-align:right">访客</div>`;
        html += `<div class="chat-bubble chat-user">${dashboard.esc(m.user)}</div>`;
        html += `<div class="chat-label">Claudia</div>`;
        html += `<div class="chat-bubble chat-bot">${dashboard.esc(m.bot)}</div>`;
    });

    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal').classList.add('active');
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ───────────────────────────────────────────────────────────────────────
const dashboard = new Dashboard(RAW_DATA);
</script>
</body>
</html>
